<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Serviço — Oficina Agenda</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js");
    }
</script>

<body>

    <header class="header">
        <h1>➕ Novo Serviço</h1>
        <span onclick="history.back()" style="cursor:pointer; font-size:1.5rem;">←</span>
    </header>

    <div class="container">

        <!-- CLIENTE -->
        <div class="form-group">
            <label>Cliente</label>
            <input
                type="text"
                id="input-cliente"
                placeholder="Digite o nome do cliente..."
                oninput="buscarClienteAutocomplete(this.value)"
                autocomplete="off"
            >
            <div class="autocomplete-lista" id="autocomplete-lista"></div>
            <input type="hidden" id="cliente-id-selecionado">
        </div>

        <p style="font-size:0.82rem; color:var(--branco-suave); margin-top:-8px; margin-bottom:16px;">
            Cliente novo?
            <span style="color:var(--laranja); cursor:pointer; text-decoration:underline;"
                onclick="abrirModalNovoCliente()">
                Cadastrar aqui
            </span>
        </p>

        <!-- TIPOS DE SERVIÇO -->
        <div class="form-group">
            <label>Tipos de serviço</label>
            <div id="tipos-container" class="tipos-grid"></div>
        </div>

        <p style="font-size:0.82rem; color:var(--branco-suave); margin-top:-8px; margin-bottom:16px;">
            Não encontrou o serviço?
            <span style="color:var(--laranja); cursor:pointer; text-decoration:underline;"
                onclick="abrirModalNovoTipo()">
                Cadastrar novo tipo
            </span>
        </p>

        <!-- OBSERVAÇÕES -->
        <div class="form-group">
            <label>Observações</label>
            <textarea id="observacoes" placeholder="Descreva detalhes sobre o serviço..."></textarea>
        </div>

        <!-- DATA DE ENTRADA -->
        <div class="form-group">
            <label>Data de entrada</label>
            <input type="date" id="data-entrada">
        </div>

        <!-- PREVISÃO DE ENTREGA -->
        <div class="form-group">
            <label>Previsão de entrega</label>
            <input type="date" id="previsao-entrega">
        </div>

        <div class="botoes-acao">
            <button class="btn-primary" onclick="cadastrarServico()">Cadastrar Serviço</button>
            <button class="btn-secondary" onclick="history.back()">Cancelar</button>
        </div>

    </div>

    <!-- MODAL NOVO CLIENTE -->
    <div class="modal-overlay" id="modal-cliente">
        <div class="modal">
            <h3>Novo Cliente</h3>
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" id="novo-cliente-nome" placeholder="Ex: Carlos Silva">
            </div>
            <div class="form-group">
                <label>Telefone</label>
                <input type="tel" id="novo-cliente-telefone" placeholder="Ex: 83999999999">
            </div>
            <div class="botoes-acao">
                <button class="btn-primary" onclick="salvarNovoCliente()">Salvar</button>
                <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- MODAL NOVO TIPO DE SERVIÇO -->
    <div class="modal-overlay" id="modal-tipo">
        <div class="modal">
            <h3>Novo Tipo de Serviço</h3>
            <div class="form-group">
                <label>Nome do serviço</label>
                <input type="text" id="novo-tipo-nome" placeholder="Ex: Troca de peças">
            </div>
            <div class="botoes-acao">
                <button class="btn-primary" onclick="salvarNovoTipo()">Salvar</button>
                <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <nav class="nav-bottom">
        <a href="index.html" class="nav-item">
            <span>🏠</span>
            Início
        </a>
        <a href="servicos.html" class="nav-item">
            <span>🔧</span>
            Serviços
        </a>
        <a href="clientes.html" class="nav-item">
            <span>👥</span>
            Clientes
        </a>
    </nav>

    <script src="js/config.js"></script>
    <script src="js/novo-servico.js"></script>

</body>
</html>
